function seededShuffle(arr) {
  const today = new Date();
  const seed = today.getFullYear()*10000+(today.getMonth()+1)*100+today.getDate();
  const a=[...arr]; let s=seed;
  for(let i=a.length-1;i>0;i--){s=(s*1664525+1013904223)&0xffffffff;const j=Math.abs(s)%(i+1);[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function shuffle(arr){return [...arr].sort(()=>Math.random()-0.5);}

const ROW_HEADERS_K=["ア행","カ행","サ행","タ행","ナ행","ハ행","マ행","ヤ행","ラ행","ワ행","ン",""];

// ===================== KANA GRID =====================
function KanaGrid({data,title,settings,isKatakana}){
  const [flipped,setFlipped]=useState(new Set());
  const [hiding,setHiding]=useState(false);
  const [subTab,setSubTab]=useState("main"); // main|dakuten|yoon|special
  const accent=settings.accent;
  const rowHeaders=isKatakana?ROW_HEADERS_K:ROW_HEADERS_H;

  function toggleFlip(i){
    if(!hiding)return;
    setFlipped(prev=>{const n=new Set(prev);n.has(i)?n.delete(i):n.add(i);return n;});
  }
  const rows=[];for(let r=0;r<12;r++)rows.push(data.slice(r*5,r*5+5));

  const subTabs=[["main","오십음도"],["dakuten","탁음/반탁음"],["yoon","요음"],["special","특수음"]];

  return(
    <div style={{padding:"12px 10px"}}>
      <h2 style={{fontFamily:"'Noto Serif JP',serif",fontSize:17,color:"#1a1a2e",marginBottom:10,textAlign:"center"}}>{title}</h2>
      {/* 서브탭 */}
      <div style={{display:"flex",gap:5,marginBottom:12,overflowX:"auto",paddingBottom:2}}>
        {subTabs.map(([v,l])=>(
          <button key={v} onClick={()=>{setSubTab(v);setFlipped(new Set());setHiding(false);}} style={{
            padding:"5px 10px",borderRadius:20,border:"none",whiteSpace:"nowrap",fontSize:11,fontWeight:"bold",cursor:"pointer",
            background:subTab===v?accent:"#f0eef8",color:subTab===v?"white":"#555"
          }}>{l}</button>
        ))}
      </div>

      {subTab==="main" && <>
        <div style={{display:"flex",justifyContent:"center",marginBottom:8,gap:8,alignItems:"center"}}>
          <button onClick={()=>{setHiding(h=>!h);setFlipped(new Set());}} style={{padding:"5px 16px",borderRadius:20,border:"none",fontSize:11,fontWeight:"bold",cursor:"pointer",background:hiding?accent:"#f0eef8",color:hiding?"white":"#555"}}>
            {hiding?"🙈 가리는 중":"👁 가리기"}
          </button>
          {hiding&&flipped.size>0&&<button onClick={()=>setFlipped(new Set())} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${accent}55`,background:"transparent",color:accent,fontSize:11,cursor:"pointer"}}>전부 가리기</button>}
        </div>
        {hiding&&<p style={{fontSize:10,color:"#bbb",textAlign:"center",marginBottom:6}}>터치하면 공개됩니다</p>}
        <div style={{overflowX:"auto"}}>
          <table style={{borderCollapse:"separate",borderSpacing:4,width:"100%"}}>
            <thead><tr><th style={{width:32}}/>
              {COL_HEADERS.map(h=><th key={h} style={{fontSize:9,color:"#aaa",fontWeight:"bold",textAlign:"center",padding:"0 0 4px"}}>{h}</th>)}
            </tr></thead>
            <tbody>
              {rows.map((row,r)=>{
                if(r===11)return null;
                return(<tr key={r}>
                  <td style={{fontSize:9,color:"#aaa",fontWeight:"bold",textAlign:"right",paddingRight:5,whiteSpace:"nowrap",verticalAlign:"middle"}}>{rowHeaders[r]}</td>
                  {row.map((item,c)=>{
                    const gi=r*5+c; const isEmpty=item.rom==="";
                    if(isEmpty)return<td key={c}/>;
                    const isFlip=flipped.has(gi); const isHid=hiding&&!isFlip;
                    return(<td key={c} style={{padding:0}}>
                      <button onClick={()=>toggleFlip(gi)} style={{width:"100%",minWidth:50,background:isFlip?accent:isHid?"#1e1e30":"white",border:`2px solid ${isFlip?accent:isHid?"#2e2e48":"#e8e0f0"}`,borderRadius:9,padding:"7px 3px",cursor:hiding?"pointer":"default",transition:"all 0.18s",transform:isFlip?"scale(1.06)":"scale(1)"}}>
                        <div style={{fontSize:18,fontFamily:"'Noto Serif JP',serif",lineHeight:1,color:isFlip?"white":isHid?"#1e1e30":"#1a1a2e"}}>{isHid?"？":item.char}</div>
                        <div style={{fontSize:8,marginTop:2,color:isFlip?"rgba(255,255,255,0.8)":isHid?"#1e1e30":"#999"}}>{isHid?"···":item.rom}</div>
                      </button>
                    </td>);
                  })}
                </tr>);
              })}
            </tbody>
          </table>
        </div>
      </>}

      {subTab==="dakuten" && <DakutenGrid accent={accent}/>}
      {subTab==="yoon" && <YoonGrid accent={accent}/>}
      {subTab==="special" && <SpecialGrid accent={accent}/>}
    </div>
  );
}

function KanaQuiz({settings}){
  const accent=settings.accent;
  const [mode,setMode]=useState("select");
  const [type,setType]=useState("hiragana");
  const [quizMode,setQuizMode]=useState("char2rom");
  const [questions,setQuestions]=useState([]);
  const [current,setCurrent]=useState(0);
  const [score,setScore]=useState(0);
  const [chosen,setChosen]=useState(null);
  const [wrong,setWrong]=useState([]);
  const getPool=()=>type==="hiragana"?HIRAGANA.filter(k=>k.rom!==""):type==="katakana"?KATAKANA.filter(k=>k.rom!==""):[...HIRAGANA,...KATAKANA].filter(k=>k.rom!=="");
  function startQuiz(){
    const pool=getPool();
    const qs=shuffle(pool).slice(0,16).map(item=>{
      const others=pool.filter(k=>k.char!==item.char&&k.rom!==item.rom);
      return{item,options:shuffle([item,...shuffle(others).slice(0,7)])};
    });
    setQuestions(qs);setCurrent(0);setScore(0);setChosen(null);setWrong([]);setMode("quiz");
  }
  function handleAnswer(opt){
    if(chosen)return; setChosen(opt);
    const correct=questions[current].item;
    if(quizMode==="char2rom"?opt.rom===correct.rom:opt.char===correct.char)setScore(s=>s+1);
    else setWrong(w=>[...w,correct]);
    setTimeout(()=>{if(current+1>=questions.length)setMode("result");else{setCurrent(c=>c+1);setChosen(null);}},750);
  }
  if(mode==="select")return(
    <div style={{padding:20}}>
      <h2 style={{fontFamily:"'Noto Serif JP',serif",fontSize:19,color:"#1a1a2e",marginBottom:4,textAlign:"center"}}>문자 퀴즈</h2>
      <p style={{fontSize:11,color:accent,textAlign:"center",marginBottom:16,fontWeight:"bold"}}>8지선다</p>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <div style={{background:"white",borderRadius:12,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
          <p style={{fontSize:12,color:"#777",marginBottom:8}}>문자 종류</p>
          <div style={{display:"flex",gap:6}}>
            {[["hiragana","히라가나"],["katakana","가타카나"],["both","둘 다"]].map(([v,l])=>(
              <button key={v} onClick={()=>setType(v)} style={{flex:1,padding:"7px 0",borderRadius:8,border:"none",background:type===v?accent:"#f0eef8",color:type===v?"white":"#555",fontWeight:"bold",fontSize:11,cursor:"pointer"}}>{l}</button>
            ))}
          </div>
        </div>
        <div style={{background:"white",borderRadius:12,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
          <p style={{fontSize:12,color:"#777",marginBottom:8}}>방향</p>
          <div style={{display:"flex",gap:6}}>
            {[["char2rom","글자 → 로마자"],["rom2char","로마자 → 글자"]].map(([v,l])=>(
              <button key={v} onClick={()=>setQuizMode(v)} style={{flex:1,padding:"7px 0",borderRadius:8,border:"none",background:quizMode===v?accent:"#f0eef8",color:quizMode===v?"white":"#555",fontWeight:"bold",fontSize:11,cursor:"pointer"}}>{l}</button>
            ))}
          </div>
        </div>
        <button onClick={startQuiz} style={{background:`linear-gradient(135deg,${accent},${accent}cc)`,color:"white",border:"none",borderRadius:12,padding:"13px 0",fontSize:15,fontWeight:"bold",cursor:"pointer"}}>퀴즈 시작 🎯</button>
      </div>
    </div>
  );
  if(mode==="result")return(
    <div style={{padding:20,textAlign:"center"}}>
      <div style={{fontSize:48,marginBottom:8}}>{score>=14?"🎉":score>=10?"😊":"💪"}</div>
      <h2 style={{fontFamily:"'Noto Serif JP',serif",fontSize:22,color:"#1a1a2e"}}>{score} / {questions.length}</h2>
      <p style={{color:"#777",marginBottom:16}}>{score>=14?"완벽해!":score>=10?"잘했어!":"조금 더 연습해보자"}</p>
      {wrong.length>0&&<div style={{background:"white",borderRadius:12,padding:14,marginBottom:14,textAlign:"left",boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
        <p style={{fontSize:12,fontWeight:"bold",color:accent,marginBottom:8}}>틀린 문자</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {wrong.map((w,i)=><span key={i} style={{background:"#fff0f0",borderRadius:8,padding:"5px 10px",fontSize:17,fontFamily:"'Noto Serif JP',serif"}}>{w.char} <span style={{fontSize:11,color:"#888"}}>{w.rom}</span></span>)}
        </div>
      </div>}
      <button onClick={()=>setMode("select")} style={{background:`linear-gradient(135deg,${accent},${accent}cc)`,color:"white",border:"none",borderRadius:12,padding:"11px 28px",fontSize:14,fontWeight:"bold",cursor:"pointer"}}>다시 하기</button>
    </div>
  );
  const q=questions[current];
  const isCorrect=opt=>quizMode==="char2rom"?opt.rom===q.item.rom:opt.char===q.item.char;
  return(
    <div style={{padding:20}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
        <span style={{fontSize:12,color:"#888"}}>{current+1} / {questions.length}</span>
        <span style={{fontSize:12,color:accent,fontWeight:"bold"}}>점수 {score}</span>
      </div>
      <div style={{background:"#e8e0f0",width:"100%",height:3,borderRadius:2,marginBottom:14}}>
        <div style={{background:accent,width:`${(current/questions.length)*100}%`,height:"100%",borderRadius:2,transition:"width 0.3s"}}/>
      </div>
      <div style={{background:"linear-gradient(135deg,#1a1a2e,#16213e)",borderRadius:18,padding:"22px 18px",textAlign:"center",marginBottom:12,boxShadow:"0 6px 24px rgba(0,0,0,0.15)"}}>
        <div style={{fontSize:quizMode==="char2rom"?64:20,fontFamily:"'Noto Serif JP',serif",color:"white",lineHeight:1}}>{quizMode==="char2rom"?q.item.char:q.item.rom.toUpperCase()}</div>
        <div style={{fontSize:10,color:"#555",marginTop:5}}>{quizMode==="char2rom"?"로마자를 고르세요":"문자를 고르세요"}</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
        {q.options.map((opt,i)=>{
          let bg="white",border="2px solid #e8e0f0";
          if(chosen){if(isCorrect(opt)){bg="#d4f7d4";border="2px solid #4caf50";}else if(opt.char===chosen.char&&!isCorrect(opt)){bg="#ffd4d4";border="2px solid #e63946";}}
          return(<button key={i} onClick={()=>handleAnswer(opt)} style={{background:bg,border,borderRadius:10,padding:"10px 5px",cursor:chosen?"default":"pointer",transition:"all 0.18s"}}>
            <div style={{fontSize:quizMode==="char2rom"?12:22,fontFamily:"'Noto Serif JP',serif",color:"#1a1a2e",fontWeight:"bold"}}>{quizMode==="char2rom"?opt.rom:opt.char}</div>
          </button>);
        })}
      </div>
    </div>
  );
}

// ===================== VOCAB QUIZ =====================
function VocabQuiz({settings,vocabList,quizStats,setQuizStats}){
  const accent=settings.accent;
  const [mode,setMode]=useState("select");
  const [quizDir,setQuizDir]=useState("jp2kr");
  const [questions,setQuestions]=useState([]);
  const [current,setCurrent]=useState(0);
  const [score,setScore]=useState(0);
  const [chosen,setChosen]=useState(null);
  const [wrong,setWrong]=useState([]);
  function start(){
    const qs=shuffle(vocabList).slice(0,15).map(item=>{
      const others=vocabList.filter(v=>v.jp!==item.jp);
      return{item,options:shuffle([item,...shuffle(others).slice(0,3)])};
    });
    setQuestions(qs);setCurrent(0);setScore(0);setChosen(null);setWrong([]);setMode("quiz");
  }
  function handleAnswerFinal(opt){
    if(chosen)return; setChosen(opt);
    const isRight=opt.jp===questions[current].item.jp;
    const newScore=isRight?score+1:score;
    if(isRight)setScore(s=>s+1); else setWrong(w=>[...w,questions[current].item]);
    setTimeout(()=>{
      if(current+1>=questions.length){
        const pct=Math.round((newScore/15)*100);
        const now=new Date();
        setQuizStats(prev=>[{date:`${now.getMonth()+1}/${now.getDate()}`,score:newScore,total:15,pct,dir:quizDir==="jp2kr"?"일→한":"한→일"},...prev].slice(0,20));
        setMode("result");
      }else{setCurrent(c=>c+1);setChosen(null);}
    },750);
  }
  if(mode==="stats"){
    const avgPct=quizStats.length>0?Math.round(quizStats.reduce((a,b)=>a+b.pct,0)/quizStats.length):0;
    const best=quizStats.length>0?Math.max(...quizStats.map(s=>s.pct)):0;
    return(<div style={{padding:20}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
        <button onClick={()=>setMode("select")} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#888"}}>←</button>
        <h2 style={{fontFamily:"'Noto Serif JP',serif",fontSize:19,color:"#1a1a2e"}}>테스트 통계</h2>
      </div>
      {quizStats.length===0?<div style={{textAlign:"center",padding:"40px 0",color:"#bbb"}}><div style={{fontSize:40,marginBottom:10}}>📊</div><p>아직 기록이 없어요</p></div>:<>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
          {[["총 횟수",`${quizStats.length}회`,"📝"],["평균",`${avgPct}%`,"📈"],["최고",`${best}%`,"🏆"]].map(([l,v,e])=>(
            <div key={l} style={{background:"white",borderRadius:12,padding:"12px 8px",textAlign:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
              <div style={{fontSize:20,marginBottom:4}}>{e}</div>
              <div style={{fontSize:17,fontWeight:"bold",color:"#1a1a2e"}}>{v}</div>
              <div style={{fontSize:10,color:"#aaa"}}>{l}</div>
            </div>
          ))}
        </div>
        <div style={{background:"white",borderRadius:12,padding:14,marginBottom:14,boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
          <p style={{fontSize:12,color:"#888",marginBottom:10}}>최근 기록</p>
          {quizStats.slice(0,8).map((s,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
              <span style={{fontSize:10,color:"#aaa",width:28,flexShrink:0}}>{s.date}</span>
              <div style={{flex:1,background:"#f0eef8",borderRadius:4,height:18,overflow:"hidden"}}>
                <div style={{width:`${s.pct}%`,height:"100%",background:s.pct>=80?"#4caf50":s.pct>=60?accent:"#e63946",borderRadius:4,display:"flex",alignItems:"center",paddingLeft:4}}>
                  <span style={{fontSize:9,color:"white",fontWeight:"bold"}}>{s.score}/{s.total}</span>
                </div>
              </div>
              <span style={{fontSize:10,color:"#888",width:22,flexShrink:0}}>{s.dir}</span>
            </div>
          ))}
        </div>
        <button onClick={()=>setQuizStats([])} style={{width:"100%",padding:"8px 0",borderRadius:10,border:"1px solid #fdd",background:"#fff5f5",color:"#e63946",fontSize:11,cursor:"pointer"}}>기록 초기화</button>
      </>}
    </div>);
  }
  if(mode==="select"){
  const today=new Date();
  const dateStr=`${today.getMonth()+1}월 ${today.getDate()}일`;
  return(
    <div style={{padding:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <h2 style={{fontFamily:"'Noto Serif JP',serif",fontSize:19,color:"#1a1a2e"}}>단어 테스트</h2>
        <button onClick={()=>setMode("stats")} style={{background:"white",border:`1.5px solid ${accent}44`,borderRadius:10,padding:"5px 12px",fontSize:11,color:accent,fontWeight:"bold",cursor:"pointer"}}>📊 통계</button>
      </div>
      <div style={{background:accent+"18",borderRadius:12,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:16}}>📅</span>
        <div>
          <div style={{fontSize:12,fontWeight:"bold",color:accent}}>{dateStr} 오늘의 단어</div>
          <div style={{fontSize:11,color:"#888"}}>{vocabList.length}개 — 단어장 암기와 동일한 범위</div>
        </div>
      </div>
      {quizStats.length>0&&<div style={{background:"white",borderRadius:12,padding:12,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.05)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:12,color:"#888"}}>최근 점수</span>
        <span style={{fontSize:14,fontWeight:"bold",color:quizStats[0].pct>=80?"#4caf50":quizStats[0].pct>=60?accent:"#e63946"}}>{quizStats[0].score}/{quizStats[0].total} ({quizStats[0].pct}%)</span>
      </div>}
      <div style={{background:"white",borderRadius:12,padding:14,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
        <p style={{fontSize:12,color:"#777",marginBottom:8}}>출제 방향</p>
        <div style={{display:"flex",gap:6}}>
          {[["jp2kr","일본어 → 한국어"],["kr2jp","한국어 → 일본어"]].map(([v,l])=>(
            <button key={v} onClick={()=>setQuizDir(v)} style={{flex:1,padding:"7px 0",borderRadius:8,border:"none",background:quizDir===v?accent:"#f0eef8",color:quizDir===v?"white":"#555",fontWeight:"bold",fontSize:11,cursor:"pointer"}}>{l}</button>
          ))}
        </div>
      </div>
      <button onClick={start} style={{width:"100%",background:`linear-gradient(135deg,${accent},${accent}cc)`,color:"white",border:"none",borderRadius:12,padding:"13px 0",fontSize:15,fontWeight:"bold",cursor:"pointer"}}>테스트 시작 📝</button>
    </div>
  );}
  if(mode==="result")return(
    <div style={{padding:20,textAlign:"center"}}>
      <div style={{fontSize:48,marginBottom:8}}>{score>=13?"🏆":score>=10?"👍":"📚"}</div>
      <h2 style={{fontFamily:"'Noto Serif JP',serif",fontSize:22,color:"#1a1a2e"}}>{score} / {questions.length}</h2>
      <div style={{fontSize:13,color:"#888",marginBottom:4}}>{Math.round((score/questions.length)*100)}%</div>
      <p style={{color:"#777",marginBottom:16}}>{score>=13?"훌륭해!":score>=10?"잘했어!":"더 연습해보자!"}</p>
      {wrong.length>0&&<div style={{background:"white",borderRadius:12,padding:14,marginBottom:14,textAlign:"left",boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
        <p style={{fontSize:12,fontWeight:"bold",color:accent,marginBottom:8}}>복습 단어</p>
        {wrong.map((w,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #f5f5f5"}}>
            <span style={{fontFamily:"'Noto Serif JP',serif",fontSize:15}}>{w.jp}</span>
            <span style={{fontSize:11,color:"#aaa"}}>{w.read}</span>
            <span style={{fontSize:12,color:accent,fontWeight:"bold"}}>{w.kr}</span>
          </div>
        ))}
      </div>}
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setMode("select")} style={{flex:1,background:"#f0eef8",color:"#555",border:"none",borderRadius:12,padding:"11px 0",fontSize:13,fontWeight:"bold",cursor:"pointer"}}>처음으로</button>
        <button onClick={start} style={{flex:1,background:`linear-gradient(135deg,${accent},${accent}cc)`,color:"white",border:"none",borderRadius:12,padding:"11px 0",fontSize:13,fontWeight:"bold",cursor:"pointer"}}>다시 하기</button>
      </div>
    </div>
  );
  const q=questions[current];
  return(
    <div style={{padding:20}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
        <span style={{fontSize:12,color:"#888"}}>{current+1} / {questions.length}</span>
        <span style={{fontSize:12,color:accent,fontWeight:"bold"}}>점수 {score}</span>
      </div>
      <div style={{background:"#e8e0f0",width:"100%",height:3,borderRadius:2,marginBottom:18}}>
        <div style={{background:accent,width:`${(current/questions.length)*100}%`,height:"100%",borderRadius:2,transition:"width 0.3s"}}/>
      </div>
      <div style={{background:"linear-gradient(135deg,#1a1a2e,#16213e)",borderRadius:18,padding:"34px 18px",textAlign:"center",marginBottom:18}}>
        {quizDir==="jp2kr"?(<><div style={{fontSize:40,fontFamily:"'Noto Serif JP',serif",color:"white"}}>{q.item.jp}</div><div style={{fontSize:13,color:"#777",marginTop:5}}>{q.item.read}</div></>):(<div style={{fontSize:26,color:"white",fontWeight:"bold"}}>{q.item.kr}</div>)}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:9}}>
        {q.options.map((opt,i)=>{
          let bg="white",border="2px solid #e8e0f0";
          if(chosen){if(opt.jp===q.item.jp){bg="#d4f7d4";border="2px solid #4caf50";}else if(opt.jp===chosen.jp){bg="#ffd4d4";border="2px solid #e63946";}}
          return(<button key={i} onClick={()=>handleAnswerFinal(opt)} style={{background:bg,border,borderRadius:11,padding:"13px 14px",cursor:chosen?"default":"pointer",transition:"all 0.18s",textAlign:"left"}}>
            <span style={{fontFamily:"'Noto Serif JP',serif",fontSize:quizDir==="jp2kr"?14:19,color:"#1a1a2e"}}>{quizDir==="jp2kr"?opt.kr:opt.jp}</span>
            {quizDir==="kr2jp"&&<span style={{fontSize:11,color:"#bbb",marginLeft:7}}>{opt.read}</span>}
          </button>);
        })}
      </div>
    </div>
  );
}

// ===================== 단어장 + 암기 통합 탭 =====================
// 오늘의 단어: 날짜 기반으로 전체 단어에서 순차 20개 추출
function getTodayWords(vocabList) {
  const today = new Date();
  const dayNum = Math.floor(today.getTime() / 86400000); // 날짜별 고정값
  const total = vocabList.length;
  const size = Math.min(20, total);
  const start = (dayNum * 20) % total;
  const result = [];
  for (let i = 0; i < size; i++) result.push(vocabList[(start + i) % total]);
  return result;
}

function VocabTab({ settings, vocabList }) {
  const accent = settings.accent;
  const [view, setView] = useState("list"); // list | study_today | study_all
  const [search, setSearch] = useState("");

  // 오늘의 단어 (날짜 고정, 순차)
  const todayWords = useMemo(() => getTodayWords(vocabList), [vocabList]);
  const today = new Date();
  const dateStr = `${today.getMonth()+1}월 ${today.getDate()}일`;

  // 전체 순차 암기: 인덱스 기반 (랜덤 없음)
  const allWords = vocabList; // 원래 순서 그대로

  const filtered = vocabList.filter(v =>
    v.jp.includes(search) || v.read.includes(search) || v.kr.includes(search)
  );

  if (view === "study_today") return <FlashcardStudy settings={settings} cards={todayWords} title={`오늘의 단어 (${dateStr})`} onBack={() => setView("list")} />;
  if (view === "study_all") return <FlashcardStudy settings={settings} cards={allWords} title="전체 순차 암기" onBack={() => setView("list")} sequential />;

  return (
    <div style={{ padding: 16 }}>
      <h2 style={{ fontFamily:"'Noto Serif JP',serif", fontSize:18, color:"#1a1a2e", marginBottom:12, textAlign:"center" }}>단어장</h2>

      {/* 암기 진입 버튼 */}
      <div style={{ display:"flex", gap:8, marginBottom:14 }}>
        <button onClick={() => setView("study_today")} style={{
          flex:1, padding:"12px 0", borderRadius:12, border:"none", cursor:"pointer",
          background:`linear-gradient(135deg,${accent},${accent}cc)`, color:"white",
          fontWeight:"bold", fontSize:13,
        }}>
          📅 오늘의 단어<br/>
          <span style={{ fontSize:10, fontWeight:"normal", opacity:0.85 }}>{todayWords.length}개 · {dateStr}</span>
        </button>
        <button onClick={() => setView("study_all")} style={{
          flex:1, padding:"12px 0", borderRadius:12, border:"none", cursor:"pointer",
          background:"white", color:accent, fontWeight:"bold", fontSize:13,
          border:`2px solid ${accent}44`, boxShadow:"0 2px 8px rgba(0,0,0,0.06)",
        }}>
          📚 전체 순차 암기<br/>
          <span style={{ fontSize:10, fontWeight:"normal", color:"#aaa" }}>{vocabList.length}개 전체</span>
        </button>
      </div>

      {/* 검색 */}
      <div style={{ background:"white", borderRadius:12, padding:"8px 12px", marginBottom:10, boxShadow:"0 2px 8px rgba(0,0,0,0.05)", display:"flex", alignItems:"center", gap:8 }}>
        <span style={{ fontSize:14, color:"#bbb" }}>🔍</span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="일본어 / 읽기 / 뜻 검색..." style={{ border:"none", outline:"none", fontSize:13, flex:1, color:"#333", background:"transparent" }}/>
        {search && <button onClick={()=>setSearch("")} style={{ border:"none", background:"none", color:"#bbb", cursor:"pointer", fontSize:14 }}>✕</button>}
      </div>
      <p style={{ fontSize:11, color:"#aaa", marginBottom:8 }}>{filtered.length}개 단어</p>

      {/* 단어 목록 */}
      <div style={{ background:"white", borderRadius:12, overflow:"hidden", boxShadow:"0 2px 8px rgba(0,0,0,0.05)" }}>
        <div style={{ display:"grid", gridTemplateColumns:"2fr 2fr 3fr", background:"#f8f6ff", padding:"8px 14px", borderBottom:"1px solid #ece8f6" }}>
          <span style={{ fontSize:11, color:"#888", fontWeight:"bold" }}>일본어</span>
          <span style={{ fontSize:11, color:"#888", fontWeight:"bold" }}>읽기</span>
          <span style={{ fontSize:11, color:"#888", fontWeight:"bold" }}>뜻</span>
        </div>
        {filtered.length === 0
          ? <div style={{ padding:"24px 0", textAlign:"center", color:"#bbb", fontSize:13 }}>검색 결과 없음</div>
          : filtered.map((v, i) => (
            <div key={i} style={{ display:"grid", gridTemplateColumns:"2fr 2fr 3fr", padding:"9px 14px", borderBottom: i < filtered.length-1 ? "1px solid #f5f5f5" : "none", alignItems:"center" }}>
              <span style={{ fontFamily:"'Noto Serif JP',serif", fontSize:16, color:"#1a1a2e" }}>{v.jp}</span>
              <span style={{ fontSize:11, color:"#888" }}>{v.read}</span>
              <span style={{ fontSize:12, color:"#444" }}>{v.kr}</span>
            </div>
          ))
        }
      </div>
    </div>
  );
}

// 암기 카드 (오늘의 단어 / 전체 순차 공용)
function FlashcardStudy({ settings, cards, title, onBack, sequential }) {
  const accent = settings.accent;
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [known, setKnown] = useState(new Set());
  const [unknown, setUnknown] = useState(new Set());
  const [done, setDone] = useState(false);
  const total = cards.length;
  const card = cards[idx];

  function goNext() { if (idx < total-1) { setIdx(i=>i+1); setFlipped(false); } else setDone(true); }
  function goPrev() { if (idx > 0) { setIdx(i=>i-1); setFlipped(false); } }
  function markKnown() { setKnown(s=>new Set([...s,idx])); setUnknown(s=>{const n=new Set(s);n.delete(idx);return n;}); goNext(); }
  function markUnknown() { setUnknown(s=>new Set([...s,idx])); setKnown(s=>{const n=new Set(s);n.delete(idx);return n;}); goNext(); }

  if (done) return (
    <div style={{ padding:20, textAlign:"center" }}>
      <div style={{ fontSize:48, marginBottom:10 }}>✅</div>
      <h2 style={{ fontFamily:"'Noto Serif JP',serif", color:"#1a1a2e", marginBottom:4 }}>완료!</h2>
      <p style={{ color:"#888", fontSize:12, marginBottom:16 }}>{title}</p>
      <div style={{ display:"flex", justifyContent:"center", gap:14, marginBottom:16 }}>
        <div style={{ background:"#d4f7d4", borderRadius:12, padding:"12px 20px" }}><div style={{ fontSize:26, fontWeight:"bold", color:"#2e7d32" }}>{known.size}</div><div style={{ fontSize:11, color:"#555" }}>알아 ✓</div></div>
        <div style={{ background:"#ffd4d4", borderRadius:12, padding:"12px 20px" }}><div style={{ fontSize:26, fontWeight:"bold", color:"#c62828" }}>{unknown.size}</div><div style={{ fontSize:11, color:"#555" }}>모름 ✗</div></div>
      </div>
      {unknown.size > 0 && (
        <div style={{ background:"white", borderRadius:12, padding:14, marginBottom:14, textAlign:"left", boxShadow:"0 2px 8px rgba(0,0,0,0.05)" }}>
          <p style={{ fontSize:12, fontWeight:"bold", color:accent, marginBottom:8 }}>복습 필요</p>
          {[...unknown].map(i => (
            <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"5px 0", borderBottom:"1px solid #f5f5f5" }}>
              <span style={{ fontFamily:"'Noto Serif JP',serif", fontSize:15 }}>{cards[i].jp}</span>
              <span style={{ fontSize:11, color:"#aaa" }}>{cards[i].read}</span>
              <span style={{ fontSize:12, color:accent, fontWeight:"bold" }}>{cards[i].kr}</span>
            </div>
          ))}
        </div>
      )}
      <div style={{ display:"flex", gap:8 }}>
        <button onClick={onBack} style={{ flex:1, background:"#f0eef8", color:"#555", border:"none", borderRadius:12, padding:"11px 0", fontSize:13, fontWeight:"bold", cursor:"pointer" }}>← 단어장</button>
        <button onClick={() => { setIdx(0); setFlipped(false); setDone(false); setKnown(new Set()); setUnknown(new Set()); }} style={{ flex:1, background:`linear-gradient(135deg,${accent},${accent}cc)`, color:"white", border:"none", borderRadius:12, padding:"11px 0", fontSize:13, fontWeight:"bold", cursor:"pointer" }}>다시 시작</button>
      </div>
    </div>
  );

  return (
    <div style={{ padding:20 }}>
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
        <button onClick={onBack} style={{ background:"none", border:"none", fontSize:20, cursor:"pointer", color:"#888" }}>←</button>
        <span style={{ fontSize:13, color:"#888", flex:1 }}>{title}</span>
        <div style={{ display:"flex", gap:5 }}>
          <span style={{ fontSize:11, background:"#d4f7d4", borderRadius:20, padding:"2px 9px", color:"#2e7d32" }}>✓ {known.size}</span>
          <span style={{ fontSize:11, background:"#ffd4d4", borderRadius:20, padding:"2px 9px", color:"#c62828" }}>✗ {unknown.size}</span>
        </div>
      </div>

      {/* 진행 바 */}
      <div style={{ background:"#e8e0f0", width:"100%", height:3, borderRadius:2, marginBottom:14 }}>
        <div style={{ background:accent, width:`${(idx/total)*100}%`, height:"100%", borderRadius:2, transition:"width 0.3s" }}/>
      </div>

      {/* 카드 */}
      <div onClick={()=>setFlipped(f=>!f)} style={{
        background: flipped ? "linear-gradient(135deg,#1a1a2e,#16213e)" : "white",
        borderRadius:18, padding:"34px 22px", textAlign:"center", minHeight:160, cursor:"pointer",
        boxShadow: flipped ? "0 8px 28px rgba(0,0,0,0.2)" : "0 4px 14px rgba(0,0,0,0.07)",
        transition:"all 0.3s", marginBottom:12,
        display:"flex", flexDirection:"column", justifyContent:"center", alignItems:"center",
        border: known.has(idx) ? "2px solid #4caf50" : unknown.has(idx) ? `2px solid ${accent}` : "2px solid transparent",
      }}>
        {!flipped ? (<>
          {sequential && <div style={{ fontSize:10, color:"#ccc", marginBottom:6 }}>#{idx+1}</div>}
          <div style={{ fontSize:40, fontFamily:"'Noto Serif JP',serif", color:"#1a1a2e" }}>{card.jp}</div>
          <div style={{ fontSize:13, color:"#bbb", marginTop:4 }}>{card.read}</div>
          <div style={{ fontSize:10, color:"#ccc", marginTop:10 }}>터치해서 뜻 보기</div>
        </>) : (<>
          <div style={{ fontSize:28, fontFamily:"'Noto Serif JP',serif", color:"white" }}>{card.jp}</div>
          <div style={{ fontSize:12, color:"#666", marginTop:3 }}>{card.read}</div>
          <div style={{ fontSize:24, color:accent, fontWeight:"bold", marginTop:10 }}>{card.kr}</div>
        </>)}
      </div>

      {/* 버튼 */}
      <div style={{ display:"flex", alignItems:"center", gap:7 }}>
        <button onClick={goPrev} disabled={idx===0} style={{ width:42, height:42, borderRadius:11, border:"2px solid #e8e0f0", background:"white", fontSize:17, cursor:idx===0?"not-allowed":"pointer", color:idx===0?"#ddd":"#555", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center" }}>←</button>
        {flipped ? (<>
          <button onClick={markUnknown} style={{ flex:1, padding:"10px 0", borderRadius:11, border:"none", background:"#ffd4d4", color:"#c62828", fontWeight:"bold", fontSize:13, cursor:"pointer" }}>모르겠어 ✗</button>
          <button onClick={markKnown} style={{ flex:1, padding:"10px 0", borderRadius:11, border:"none", background:"#d4f7d4", color:"#2e7d32", fontWeight:"bold", fontSize:13, cursor:"pointer" }}>알아! ✓</button>
        </>) : (
          <button onClick={goNext} style={{ flex:1, padding:"10px 0", borderRadius:11, border:"2px solid #e8e0f0", background:"white", color:"#999", fontSize:12, cursor:"pointer" }}>그냥 넘기기</button>
        )}
        <button onClick={goNext} style={{ width:42, height:42, borderRadius:11, border:"2px solid #e8e0f0", background:"white", fontSize:17, cursor:"pointer", color:"#555", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center" }}>→</button>
      </div>
      <div style={{ textAlign:"center", fontSize:11, color:"#ccc", marginTop:8 }}>{idx+1} / {total}</div>
    </div>
  );
}

// ===================== PHRASES =====================
function PhrasesTab({settings}){
  const accent=settings.accent;
  const situations=[...new Set(PHRASES.map(p=>p.situation))];
  const [active,setActive]=useState(situations[0]);
  const [expanded,setExpanded]=useState(null);
  const filtered=PHRASES.filter(p=>p.situation===active);
  return(
    <div style={{padding:16}}>
      <h2 style={{fontFamily:"'Noto Serif JP',serif",fontSize:19,color:"#1a1a2e",marginBottom:14,textAlign:"center"}}>일상 표현</h2>
      <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:14,paddingBottom:3}}>
        {situations.map(s=><button key={s} onClick={()=>{setActive(s);setExpanded(null);}} style={{padding:"5px 13px",borderRadius:20,border:"none",whiteSpace:"nowrap",background:active===s?accent:"#f0eef8",color:active===s?"white":"#555",fontWeight:"bold",fontSize:11,cursor:"pointer"}}>{s}</button>)}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:9}}>
        {filtered.map((p,i)=>(
          <div key={i} onClick={()=>setExpanded(expanded===i?null:i)} style={{background:"white",borderRadius:13,padding:"13px 15px",boxShadow:"0 2px 8px rgba(0,0,0,0.05)",cursor:"pointer",border:expanded===i?`2px solid ${accent}`:"2px solid transparent",transition:"all 0.18s"}}>
            <div style={{fontFamily:"'Noto Serif JP',serif",fontSize:19,color:"#1a1a2e"}}>{p.jp}</div>
            <div style={{fontSize:11,color:"#bbb",marginTop:2}}>{p.read}</div>
            {expanded===i&&<div style={{marginTop:9,paddingTop:9,borderTop:"1px solid #f0eef8"}}>
              <div style={{fontSize:15,color:accent,fontWeight:"bold"}}>{p.kr}</div>
              <div style={{fontSize:11,color:"#888",marginTop:5,background:"#fafafa",borderRadius:7,padding:"5px 9px"}}>💡 {p.note}</div>
            </div>}
          </div>
        ))}
      </div>
    </div>
  );
}

// ===================== SETTINGS =====================
const ACCENT_COLORS=[{name:"레드",value:"#e63946"},{name:"인디고",value:"#4361ee"},{name:"그린",value:"#2d9a60"},{name:"오렌지",value:"#f77f00"},{name:"퍼플",value:"#7b2d8b"},{name:"틸",value:"#0096c7"}];
function SettingsTab({settings,setSettings,quizStats,setQuizStats}){
  function toggle(key){setSettings(s=>({...s,[key]:!s[key]}));}
  return(
    <div>
      <div style={{background:"white",borderRadius:14,padding:16,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
        <p style={{fontSize:13,fontWeight:"bold",color:"#333",marginBottom:12}}>테마 색상</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
          {ACCENT_COLORS.map(c=>(
            <button key={c.value} onClick={()=>setSettings(s=>({...s,accent:c.value}))} style={{padding:"10px 0",borderRadius:10,border:`2px solid ${settings.accent===c.value?c.value:"#e8e0f0"}`,background:settings.accent===c.value?c.value+"18":"white",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div style={{width:22,height:22,borderRadius:"50%",background:c.value,boxShadow:settings.accent===c.value?`0 2px 8px ${c.value}66`:"none"}}/>
              <span style={{fontSize:10,color:settings.accent===c.value?c.value:"#888",fontWeight:"bold"}}>{c.name}</span>
            </button>
          ))}
        </div>
      </div>
      <div style={{background:"white",borderRadius:14,padding:16,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
        <p style={{fontSize:13,fontWeight:"bold",color:"#333",marginBottom:12}}>표시 옵션</p>
        {[["showReading","단어 암기 — 읽기(ひらがな) 표시"]].map(([key,label])=>(
          <div key={key} onClick={()=>toggle(key)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",cursor:"pointer"}}>
            <span style={{fontSize:13,color:"#444"}}>{label}</span>
            <div style={{width:42,height:24,borderRadius:12,background:settings[key]?settings.accent:"#ddd",position:"relative",transition:"background 0.2s",flexShrink:0}}>
              <div style={{width:18,height:18,borderRadius:"50%",background:"white",position:"absolute",top:3,left:settings[key]?21:3,transition:"left 0.2s",boxShadow:"0 1px 4px rgba(0,0,0,0.2)"}}/>
            </div>
          </div>
        ))}
      </div>
      <div style={{background:"white",borderRadius:14,padding:16,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
        <p style={{fontSize:13,fontWeight:"bold",color:"#333",marginBottom:10}}>단어 테스트 통계 요약</p>
        {quizStats.length===0?<p style={{fontSize:12,color:"#bbb"}}>아직 기록이 없어요</p>:<>
          <div style={{display:"flex",justifyContent:"space-around",marginBottom:10}}>
            {[["총 횟수",`${quizStats.length}회`],["평균",`${Math.round(quizStats.reduce((a,b)=>a+b.pct,0)/quizStats.length)}%`],["최고",`${Math.max(...quizStats.map(s=>s.pct))}%`]].map(([l,v])=>(
              <div key={l} style={{textAlign:"center"}}>
                <div style={{fontSize:18,fontWeight:"bold",color:settings.accent}}>{v}</div>
                <div style={{fontSize:10,color:"#aaa"}}>{l}</div>
              </div>
            ))}
          </div>
          <button onClick={()=>setQuizStats([])} style={{width:"100%",padding:"7px 0",borderRadius:9,border:"1px solid #fdd",background:"#fff5f5",color:"#e63946",fontSize:11,cursor:"pointer"}}>통계 초기화</button>
        </>}
      </div>
      <div style={{background:"white",borderRadius:14,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
        <p style={{fontSize:13,fontWeight:"bold",color:"#333",marginBottom:8}}>앱 정보</p>
        <div style={{fontSize:12,color:"#888",lineHeight:1.8}}>
          <div>미래엔 2022개정 고등학교 일본어 I</div>
          <div>중간고사 단어 {VOCAB_EXAM.length}개 · 일상 단어 {VOCAB_GENERAL.length}개</div>
          <div style={{marginTop:6,color:"#bbb",fontSize:11}}>made by 21209 김예성</div>
        </div>
      </div>
    </div>
  );
}

// ===================== MAIN APP =====================
function App(){
  const [tab,setTab]=useState("hiragana");
  const [kanaSubTab,setKanaSubTab]=useState("hiragana");
  const [quizStats,setQuizStats]=useState([]);
  const [settingsOpen,setSettingsOpen]=useState(false);
  const [appMode,setAppMode]=useState("exam"); // exam | general
  const [settings,setSettings]=useState({accent:"#e63946",showReading:true});

  const vocabList=appMode==="exam"?VOCAB_EXAM:VOCAB_GENERAL;
  const accent=settings.accent;

  const tabs=[
    {id:"hiragana",label:"오십음도",icon:"あ"},
    {id:"kanaQuiz",label:"문자퀴즈",icon:"?"},
    {id:"vocab",label:"단어장",icon:"📖"},
    {id:"vocabQuiz",label:"단어테스트",icon:"✏️"},
    {id:"phrases",label:"일상표현",icon:"💬"},
  ];

  return(
    <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",background:"#f5f3fc",fontFamily:"'Noto Sans KR',sans-serif",position:"relative",paddingBottom:80}}>

        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
        ::-webkit-scrollbar{height:4px}::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
        input::placeholder{color:#bbb}
      `}</style>

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1a1a2e,#16213e)",padding:"12px 16px 10px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontSize:24,fontFamily:"'Noto Serif JP',serif",color:accent}}>日</div>
          <div>
            <div style={{fontSize:15,fontWeight:"bold",color:"white",letterSpacing:1}}>일본어 학습</div>
            <div style={{fontSize:9,color:"#555"}}>미래엔 2022개정 · 일본어 I</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {/* 모드 토글 */}
          <button onClick={()=>setAppMode(m=>m==="exam"?"general":"exam")} style={{
            padding:"4px 10px",borderRadius:20,border:"none",cursor:"pointer",fontSize:10,fontWeight:"bold",
            background:appMode==="exam"?"#e63946":"#4361ee",color:"white",transition:"all 0.2s"
          }}>{appMode==="exam"?"📝 중간고사":"🌏 일상용"}</button>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:8,color:"#333"}}>made by</div>
            <div style={{fontSize:9,color:"#444",fontWeight:"bold"}}>21209 김예성</div>
          </div>
          <button onClick={()=>setSettingsOpen(true)} style={{width:32,height:32,borderRadius:"50%",background:"rgba(255,255,255,0.08)",border:"1.5px solid rgba(255,255,255,0.15)",color:"rgba(255,255,255,0.7)",fontSize:15,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>⚙️</button>
        </div>
      </div>

      {/* 모드 안내 배너 */}
      {(tab==="vocab"||tab==="vocabQuiz")&&
        <div style={{background:appMode==="exam"?"#fff3f3":"#f0f4ff",padding:"6px 16px",display:"flex",alignItems:"center",gap:6,borderBottom:"1px solid #ece8f6"}}>
          <span style={{fontSize:11,color:appMode==="exam"?"#e63946":"#4361ee",fontWeight:"bold"}}>{appMode==="exam"?"📝 중간고사 모드":"🌏 일상 모드"}</span>

      {/* 설정 모달 */}

        <div onClick={()=>setSettingsOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>

            <div style={{padding:"12px 20px 0",position:"sticky",top:0,background:"#f5f3fc",zIndex:1}}>
              <div style={{width:36,height:4,borderRadius:2,background:"#ddd",margin:"0 auto 14px"}}/>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <h2 style={{fontFamily:"'Noto Serif JP',serif",fontSize:18,color:"#1a1a2e"}}>⚙️ 설정</h2>
                <button onClick={()=>setSettingsOpen(false)} style={{background:"none",border:"none",fontSize:20,color:"#aaa",cursor:"pointer",lineHeight:1}}>✕</button>
              </div>
            </div>
            <div style={{padding:"0 20px 32px"}}>
              <SettingsTab settings={settings} setSettings={setSettings} quizStats={quizStats} setQuizStats={setQuizStats}/>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

root.render(<App/>);
